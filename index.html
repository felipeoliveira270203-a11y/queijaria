<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Queijaria do Mineiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #d2b48c;
            background-image: linear-gradient(45deg, #8b4513 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 10px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: #8b4513;
            background-image: repeating-linear-gradient(90deg, #a0522d 0px, #a0522d 2px, #8b4513 2px, #8b4513 4px);
            color: #f5e6d3;
            padding: 15px;
            border-radius: 15px 15px 5px 5px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid #654321;
            box-shadow: 5px 5px 0px #3f2b1c;
            text-shadow: 2px 2px 0px #3f2b1c;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .badge-nuvem {
            background-color: #2e8b57;
            color: #f5e6d3;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 2px solid #654321;
        }

        .login-box {
            background: #f5e6d3;
            border: 4px solid #654321;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 6px 6px 0px #3f2b1c;
            max-width: 400px;
            margin: 50px auto;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #3f2b1c;
            border-bottom: 3px dashed #8b4513;
            padding-bottom: 10px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 3px solid #8b4513;
            border-radius: 8px;
            background: #fff8dc;
            font-size: 1rem;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background-color: #2e8b57;
            color: #f5e6d3;
            border: 3px solid #654321;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #3f2b1c;
            margin-top: 10px;
        }

        .erro-login {
            color: #b22222;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .popup-bemvindo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f5e6d3;
            border: 4px solid #654321;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 10px 10px 0px #3f2b1c;
            z-index: 2000;
            text-align: center;
            min-width: 280px;
            display: none;
        }

        .popup-bemvindo p {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3f2b1c;
            margin-bottom: 20px;
        }

        .popup-bemvindo button {
            background: #2e8b57;
            color: #f5e6d3;
            border: 3px solid #654321;
            border-radius: 8px;
            padding: 10px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #3f2b1c;
        }

        .menu-inicial {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .menu-card {
            background: #cd853f;
            border: 3px solid #654321;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 5px 5px 0px #3f2b1c;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3rem;
            color: #3f2b1c;
            transition: 0.1s;
        }

        .menu-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #3f2b1c;
        }

        .btn-sair {
            background: #b22222;
            color: #f5e6d3;
            border: 2px solid #654321;
            border-radius: 20px;
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            box-shadow: 2px 2px 0px #3f2b1c;
        }

        .semana-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5e6d3;
            padding: 5px 10px;
            border-radius: 30px;
            border: 2px solid #654321;
            margin-bottom: 15px;
            width: fit-content;
        }

        .semana-selector select {
            background: #f5e6d3;
            border: none;
            color: #3f2b1c;
            font-weight: bold;
            font-size: 1rem;
            padding: 3px;
        }

        .semana-selector button {
            background: none;
            border: none;
            color: #3f2b1c;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 3px;
            font-weight: bold;
        }

        .card {
            background: #f5e6d3;
            border: 4px solid #654321;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 6px 6px 0px #3f2b1c;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3f2b1c;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px dashed #8b4513;
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            color: #3f2b1c;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 3px solid #8b4513;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff8dc;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: #cd853f;
            color: #3f2b1c;
            border: 3px solid #654321;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0px #3f2b1c;
        }

        .btn-success {
            background-color: #2e8b57;
            color: #f5e6d3;
        }

        .btn-excel {
            background-color: #1f7b4d;
            color: #f5e6d3;
        }

        .btn-warning {
            background-color: #daa520;
            color: #3f2b1c;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.9rem;
            width: auto;
            display: inline-block;
        }

        .tabela-container {
            overflow-x: auto;
            margin-top: 10px;
            border: 2px solid #8b4513;
            background: #fff8dc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 8px;
            background-color: #8b4513;
            color: #f5e6d3;
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 3px solid #654321;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #cd853f;
            color: #3f2b1c;
            font-weight: bold;
        }

        .status-pago, .status-compra-pago {
            background-color: #2e8b57;
            color: #f5e6d3;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            border: 2px solid #3f2b1c;
        }

        .status-pendente, .status-compra-pendente {
            background-color: #b22222;
            color: #f5e6d3;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            border: 2px solid #3f2b1c;
        }

        .hidden {
            display: none !important;
        }

        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .resumo-card {
            background: #cd853f;
            color: #3f2b1c;
            padding: 15px;
            border-radius: 8px;
            border: 3px solid #654321;
            box-shadow: 4px 4px 0px #3f2b1c;
        }

        .resumo-card .label {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .resumo-card .valor {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 5px;
            text-shadow: 2px 2px 0px #3f2b1c;
            color: #f5e6d3;
        }

        .filtros {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filtro-btn {
            padding: 6px 12px;
            border-radius: 20px;
            background: #f5e6d3;
            border: 2px solid #654321;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 0px #3f2b1c;
        }

        .filtro-btn.ativo {
            background: #cd853f;
            color: #3f2b1c;
            border: 2px solid #f5e6d3;
        }

        .vendedor-badge {
            background-color: #daa520;
            color: #3f2b1c;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid #3f2b1c;
            margin-left: 5px;
        }

        .acao-btn {
            background: #f5e6d3;
            border: 2px solid #654321;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 5px;
            margin: 2px;
            box-shadow: 2px 2px 0px #3f2b1c;
        }

        .estoque-editavel {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sincronizando {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: #2e8b57;
            color: #f5e6d3;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #654321;
            font-size: 0.9rem;
            display: none;
            z-index: 1001;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: #f5e6d3;
            border: 4px solid #654321;
            border-radius: 20px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 10px 10px 0px #3f2b1c;
        }

        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #3f2b1c;
        }

        .modal-content p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .modal-botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-botoes button {
            padding: 10px 20px;
            border: 2px solid #654321;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0px #3f2b1c;
        }

        .btn-confirmar {
            background: #2e8b57;
            color: #f5e6d3;
        }

        .btn-cancelar {
            background: #b22222;
            color: #f5e6d3;
        }

        .resumo-semana {
            background: #daa520;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            border: 2px solid #654321;
        }
        
        /* Estilos para a aba de configurações */
        .config-usuario-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #cd853f;
        }
        
        .config-usuario-item:last-child {
            border-bottom: none;
        }
        
        .config-usuario-info {
            flex: 2;
        }
        
        .config-usuario-nome {
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .config-usuario-nivel {
            font-size: 0.8rem;
            color: #8b4513;
        }
        
        .config-usuario-acoes {
            display: flex;
            gap: 8px;
        }
        
        .config-senha-input {
            width: 150px;
            padding: 6px 10px;
            border: 2px solid #8b4513;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>

<body>
    <div class="container">
        <!-- POP-UP DE BOAS-VINDAS -->
        <div id="popupBoasVindas" class="popup-bemvindo">
            <p id="popupMensagem"></p>
            <button onclick="fecharPopupBoasVindas()">FECHAR</button>
        </div>

        <!-- TELA DE LOGIN -->
        <div id="loginScreen">
            <div class="login-box">
                <h2>🧀 QUEIJARIA DO MINEIRO</h2>
                <input type="text" id="loginUsuario" placeholder="Usuário">
                <input type="password" id="loginSenha" placeholder="Senha">
                <button onclick="fazerLogin()">ENTRAR</button>
                <div class="erro-login" id="erroLogin">Usuário ou senha inválidos</div>
            </div>
        </div>

        <!-- SISTEMA (APÓS LOGIN) -->
        <div id="appScreen" class="hidden">
            <div class="header">
                <h1>🧀 QUEIJARIA DO MINEIRO</h1>
                <div class="badge-nuvem" id="statusConexao">☁️ CONECTANDO...</div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="semana-selector">
                    <button onclick="semanaAnterior()">←</button>
                    <select id="selectSemana" onchange="mudarSemana()"></select>
                    <button onclick="proximaSemana()">→</button>
                </div>
                <button class="btn-sair" onclick="logout()">SAIR</button>
            </div>

            <!-- MENU INICIAL -->
            <div id="menuInicial" class="menu-inicial"></div>

            <!-- CONTEÚDO DAS ABAS -->
            <div id="conteudoAbas" class="abas-container"></div>
        </div>
    </div>

    <div class="sincronizando" id="sincronizando">☁️ Sincronizando...</div>

    <!-- MODAL DE CONFIRMAÇÃO -->
    <div id="modalConfirmacao" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>✅ QUITAR DÉBITO</h3>
            <p id="modalMensagem"></p>
            <div class="modal-botoes">
                <button class="btn-confirmar" onclick="confirmarQuitacao()">SIM</button>
                <button class="btn-cancelar" onclick="fecharModalConfirmacao()">NÃO</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- USUÁRIOS PRÉ-CADASTRADOS ----------
        let USUARIOS = [
            { usuario: 'ClaudioVale', senha: 'Queijo@Serra92', nivel: 'ADM' },
            { usuario: 'AntonioVale', senha: 'Queijaria!Vale83', nivel: 'ADM' },
            { usuario: 'IgorNogueira', senha: 'Minas#Cura47', nivel: 'VENDEDOR' }
        ];

        // ========== CONFIGURAÇÃO CORRETA DO JSONBIN ==========
        const JSONBIN_CONFIG = {
            BIN_ID: "69b50d08c3097a1dd523c95e",
            MASTER_KEY: "$2a$10$Zri5qBf3Hgz0cMNFcba8mOlJY0SwHHFtWh10Pj2NvuFQP/ZRdO1Q2"
        };

        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}`;
        const JSONBIN_HEADERS = {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_CONFIG.MASTER_KEY,
            'X-Bin-Versioning': 'false'
        };

        // ---------- VARIÁVEIS GLOBAIS ----------
        let nivelAcesso = null;
        let primeiroNome = '';
        let semanaAtual = getSemanaAtual();
        let historicoEstoque = [];
        let filtroCobrancaAtual = 'todos';
        let filtroVendedorVendas = 'todos';
        let modoEdicaoAtivo = false;
        let clienteQuitacaoPendente = null;
        let produtos = [];
        let compras = [];
        let vendas = [];
        let contadorId = 21;

        // ---------- FUNÇÕES DE GERENCIAMENTO DE USUÁRIOS ----------
        async function salvarUsuarios() {
            const dados = { produtos, compras, vendas, historicoEstoque, contadorId, usuarios: USUARIOS };
            try {
                await fetch(JSONBIN_URL, { method: 'PUT', headers: JSONBIN_HEADERS, body: JSON.stringify(dados) });
                console.log('✅ Usuários salvos na nuvem');
            } catch (erro) {
                console.error('Erro ao salvar usuários:', erro);
            }
        }

        async function carregarUsuarios() {
            try {
                const resposta = await fetch(`${JSONBIN_URL}/latest`, { headers: JSONBIN_HEADERS });
                if (!resposta.ok) throw new Error(`Erro HTTP: ${resposta.status}`);
                const dadosJson = await resposta.json();
                const dados = dadosJson.record;
                if (dados.usuarios && dados.usuarios.length > 0) {
                    USUARIOS = dados.usuarios;
                    console.log('✅ Usuários carregados da nuvem');
                }
            } catch (erro) {
                console.log('Usando usuários padrão');
            }
        }

        function atualizarConfiguracoes() {
            const container = document.getElementById('corpoConfiguracoes');
            if (!container) return;
            
            container.innerHTML = '';
            
            for (let i = 0; i < USUARIOS.length; i++) {
                const u = USUARIOS[i];
                const div = document.createElement('div');
                div.className = 'config-usuario-item';
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'config-usuario-info';
                infoDiv.innerHTML = `
                    <div class="config-usuario-nome">${u.usuario}</div>
                    <div class="config-usuario-nivel">${u.nivel === 'ADM' ? '👑 Administrador' : '🧑‍🌾 Vendedor'}</div>
                `;
                
                const acoesDiv = document.createElement('div');
                acoesDiv.className = 'config-usuario-acoes';
                
                const inputSenha = document.createElement('input');
                inputSenha.type = 'password';
                inputSenha.className = 'config-senha-input';
                inputSenha.placeholder = 'Nova senha';
                inputSenha.id = `nova_senha_${u.usuario}`;
                
                const btnSalvar = document.createElement('button');
                btnSalvar.className = 'btn-small btn-success';
                btnSalvar.innerText = 'Alterar';
                btnSalvar.style.margin = '0';
                btnSalvar.onclick = function() {
                    const novaSenha = document.getElementById(`nova_senha_${u.usuario}`).value;
                    if (novaSenha && novaSenha.length >= 4) {
                        alterarSenhaUsuario(u.usuario, novaSenha);
                    } else if (novaSenha) {
                        alert('A senha deve ter pelo menos 4 caracteres');
                    } else {
                        alert('Digite uma nova senha');
                    }
                };
                
                acoesDiv.appendChild(inputSenha);
                acoesDiv.appendChild(btnSalvar);
                
                div.appendChild(infoDiv);
                div.appendChild(acoesDiv);
                container.appendChild(div);
            }
        }
        
        function alterarSenhaUsuario(usuario, novaSenha) {
            const userIndex = USUARIOS.findIndex(u => u.usuario === usuario);
            if (userIndex !== -1) {
                USUARIOS[userIndex].senha = novaSenha;
                salvarUsuarios();
                alert(`✅ Senha de ${usuario} alterada com sucesso!`);
                atualizarConfiguracoes();
            }
        }

        // ---------- SESSÃO 24h ----------
        function verificarSessao() {
            const sessao = localStorage.getItem('sessaoQueijaria');
            if (!sessao) return false;
            try {
                const { usuario, nivel, timestamp } = JSON.parse(sessao);
                if (Date.now() - timestamp > 24 * 60 * 60 * 1000) {
                    localStorage.removeItem('sessaoQueijaria');
                    return false;
                }
                nivelAcesso = nivel;
                primeiroNome = usuario.replace(/[A-ZÀ-Ÿ].*$/, '');
                return true;
            } catch {
                return false;
            }
        }

        // ---------- FUNÇÕES DE LOGIN ----------
        window.fazerLogin = function() {
            const usuario = document.getElementById('loginUsuario').value.trim();
            const senha = document.getElementById('loginSenha').value.trim();
            const erroEl = document.getElementById('erroLogin');
            
            const encontrado = USUARIOS.find(u => u.usuario === usuario && u.senha === senha);
            
            if (!encontrado) {
                erroEl.style.display = 'block';
                return;
            }

            erroEl.style.display = 'none';
            nivelAcesso = encontrado.nivel;
            primeiroNome = usuario.replace(/[A-ZÀ-Ÿ].*$/, '');

            localStorage.setItem('sessaoQueijaria', JSON.stringify({
                usuario: usuario,
                nivel: nivelAcesso,
                timestamp: Date.now()
            }));

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');

            // POP-UP
            document.getElementById('popupMensagem').innerText = `👋 Bem‑vindo, ${primeiroNome}!`;
            document.getElementById('popupBoasVindas').style.display = 'block';

            carregarDadosDaNuvem();
            montarMenuInicial();
        };

        window.fecharPopupBoasVindas = function() {
            document.getElementById('popupBoasVindas').style.display = 'none';
        };

        window.logout = function() {
            localStorage.removeItem('sessaoQueijaria');
            window.location.reload();
        };

        // ---------- MENU INICIAL ----------
        function montarMenuInicial() {
            const menu = document.getElementById('menuInicial');
            menu.innerHTML = '';

            const itensComuns = [
                { nome: '💰 Vendas', aba: 'vendas' },
                { nome: '📦 Estoque', aba: 'estoque' },

        // ---------- ABRIR ABA ----------
        window.abrirAba = function(aba) {
            const container = document.getElementById('conteudoAbas');
            container.innerHTML = obterTemplateAba(aba);

            setTimeout(() => {
                if (aba === 'vendas') { 
                    atualizarVendas(); 
                    calcularValorVenda();
                    atualizarSelects();
                }
                if (aba === 'estoque') {
                    atualizarEstoque();
                    modoEdicaoAtivo = false;
                    const btnEdicao = document.getElementById('btnModoEdicaoEstoque');
                    if (btnEdicao) {
                        btnEdicao.style.display = 'inline-block';
                        document.getElementById('btnSalvarEstoque').style.display = 'none';
                        document.getElementById('btnCancelarEdicao').style.display = 'none';
                    }
                }
                if (aba === 'clientes') atualizarClientes();
                if (aba === 'compras') { 
                    calcularTotalCompra(); 
                    atualizarSelects();
                    atualizarCompras();
                }
                if (aba === 'gastos') atualizarGastos();
                if (aba === 'relatorios') atualizarRelatorio();
                if (aba === 'vendedores') atualizarVendasPorVendedor();
                if (aba === 'historico') {
                    atualizarSelects();
                    atualizarHistorico();
                }
                if (aba === 'produtos') {
                    atualizarSelects();
                    atualizarTudo();
                }
                if (aba === 'configuracoes') {
                    atualizarConfiguracoes();
                }
            }, 50);
        };

        // ========== FUNÇÕES DE SINCRONIZAÇÃO (ATUALIZADAS PARA SALVAR USUÁRIOS) ==========
        function mostrarSincronizando(mostrar) {
            const el = document.getElementById('sincronizando');
            el.style.display = mostrar ? 'block' : 'none';
            if (!mostrar) setTimeout(() => el.style.display = 'none', 1000);
        }

        function atualizarStatusConexao(ok) {
            const el = document.getElementById('statusConexao');
            if (ok) { 
                el.innerHTML = '☁️ NUVEM'; 
                el.style.backgroundColor = '#2e8b57'; 
            } else { 
                el.innerHTML = '⚠️ LOCAL'; 
                el.style.backgroundColor = '#b22222'; 
            }
        }

        async function carregarDadosDaNuvem() {
            mostrarSincronizando(true);
            atualizarStatusConexao(false);
            try {
                const resposta = await fetch(`${JSONBIN_URL}/latest`, { headers: JSONBIN_HEADERS });
                if (!resposta.ok) throw new Error(`Erro HTTP: ${resposta.status}`);
                const dadosJson = await resposta.json();
                const dados = dadosJson.record;
                produtos = dados.produtos || [];
                compras = dados.compras || [];
                vendas = dados.vendas || [];
                historicoEstoque = dados.historicoEstoque || [];
                contadorId = dados.contadorId || 21;
                
                // Carregar usuários se existirem
                if (dados.usuarios && dados.usuarios.length > 0) {
                    USUARIOS = dados.usuarios;
                }
                
                compras = compras.map(c => ({ ...c, status: c.status || 'pendente' }));
                
                atualizarStatusConexao(true);
                atualizarTudo();
                if (document.getElementById('produtoVenda')) atualizarSelects();
            } catch (erro) {
                console.error('Erro ao carregar:', erro);
                usarDadosIniciais();
            } finally {
                mostrarSincronizando(false);
            }
        }

        async function salvarDadosNaNuvem() {
            mostrarSincronizando(true);
            const dados = { produtos, compras, vendas, historicoEstoque, contadorId, usuarios: USUARIOS };
            try {
                await fetch(JSONBIN_URL, { method: 'PUT', headers: JSONBIN_HEADERS, body: JSON.stringify(dados) });
                atualizarStatusConexao(true);
            } catch (erro) {
                console.error('Erro ao salvar:', erro);
                atualizarStatusConexao(false);
            } finally {
                mostrarSincronizando(false);
            }
        }

        // ========== DEMAIS FUNÇÕES (MANTIDAS IGUAIS AO ANTERIOR) ==========
        function getSemanaAtual() {
            const hoje = new Date();
            const inicio = new Date(hoje.getFullYear(), 0, 1);
            const dias = Math.floor((hoje - inicio) / 86400000);
            return Math.ceil((dias + inicio.getDay() + 1) / 7);
        }

        function salvarSnapshotEstoque(semana) {
            const snap = { semana, data: new Date().toLocaleDateString(), itens: produtos.map(p => ({ id: p.id, nome: p.nome, quantidade: p.estoque })) };
            historicoEstoque = historicoEstoque.filter(h => h.semana !== semana);
            historicoEstoque.push(snap);
            salvarDadosNaNuvem();
        }

        function atualizarSelects() {
            const selVenda = document.getElementById('produtoVenda');
            const selCompra = document.getElementById('compraProduto');
            if (selVenda) {
                selVenda.innerHTML = '';
                produtos.forEach(p => selVenda.innerHTML += `<option value="${p.id}">${p.nome} - R$ ${p.preco.toFixed(2)} (tem ${p.estoque})</option>`);
            }
            if (selCompra) {
                selCompra.innerHTML = '';
                produtos.forEach(p => selCompra.innerHTML += `<option value="${p.id}">${p.nome}</option>`);
            }
            const lista = document.getElementById('clientesList');
            if (lista) {
                lista.innerHTML = '';
                [...new Set(vendas.map(v => v.cliente))].forEach(c => { if(c) lista.innerHTML += `<option value="${c}">`; });
            }
        }

        function calcularValorVenda() {
            const id = document.getElementById('produtoVenda')?.value;
            const qtd = parseInt(document.getElementById('qtdVenda')?.value) || 1;
            const prod = produtos.find(p => p.id == id);
            if (prod) {
                document.getElementById('valorUnitarioVenda').value = 'R$ ' + prod.preco.toFixed(2);
                document.getElementById('valorTotalVenda').value = 'R$ ' + (prod.preco * qtd).toFixed(2);
            }
        }

        function calcularTotalCompra() {
            const qtd = parseInt(document.getElementById('compraQtd')?.value) || 1;
            const unit = parseFloat(document.getElementById('compraValorUnitario')?.value) || 0;
            const total = qtd * unit;
            const el = document.getElementById('compraTotalDestaque');
            if (el) el.innerText = 'R$ ' + total.toFixed(2).replace('.',',');
        }

        // ========== FUNÇÕES DE REGISTRO ==========
        window.registrarCompra = function() {
            const prodId = parseInt(document.getElementById('compraProduto')?.value);
            const qtd = parseInt(document.getElementById('compraQtd')?.value);
            const unit = parseFloat(document.getElementById('compraValorUnitario')?.value);
            const forn = document.getElementById('compraFornecedor')?.value;
            if (!prodId || !qtd || !unit || !forn) return alert('Preencha tudo!');
            const prod = produtos.find(p => p.id === prodId);
            const total = qtd * unit;
            prod.estoque += qtd;
            compras.push({ 
                id: Date.now(), 
                semana: semanaAtual, 
                produtoId: prodId, 
                produto: prod.nome, 
                qtd, 
                valorUnitario: unit, 
                valorTotal: total, 
                fornecedor: forn, 
                status: 'pendente',
                data: new Date().toLocaleDateString() 
            });
            salvarSnapshotEstoque(semanaAtual);
            document.getElementById('compraQtd').value = '1';
            document.getElementById('compraValorUnitario').value = '';
            document.getElementById('compraFornecedor').value = '';
            document.getElementById('compraTotalDestaque').innerText = 'R$ 0,00';
            atualizarTudo();
        };

        window.registrarVenda = function() {
            const vend = document.getElementById('vendedorVenda')?.value;
            const cliente = document.getElementById('clienteVenda')?.value;
            const prodId = parseInt(document.getElementById('produtoVenda')?.value);
            const qtd = parseInt(document.getElementById('qtdVenda')?.value);
            if (!vend || !cliente || !prodId || !qtd) return alert('Preencha tudo!');
            const prod = produtos.find(p => p.id === prodId);
            if (prod.estoque < qtd) return alert(`Só tem ${prod.estoque} no estoque!`);
            prod.estoque -= qtd;
            const total = prod.preco * qtd;
            vendas.push({ 
                id: Date.now(), 
                semana: semanaAtual, 
                vendedor: vend, 
                cliente, 
                produtoId: prodId, 
                produto: prod.nome, 
                qtd, 
                valorUnitario: prod.preco, 
                valorTotal: total, 
                status: 'pendente',
                data: new Date().toLocaleDateString() 
            });

        // ========== FUNÇÕES DE EXCLUSÃO ==========
        window.excluirVenda = function(id) {
            if (confirm('Tem certeza que quer apagar esta venda?')) {
                const venda = vendas.find(v => v.id === id);
                if (venda) {
                    const prod = produtos.find(p => p.id === venda.produtoId);
                    if (prod) prod.estoque += venda.qtd;
                    vendas = vendas.filter(v => v.id !== id);
                    salvarSnapshotEstoque(semanaAtual);
                    atualizarTudo();
                }
            }
        };

        window.excluirCompra = function(id) {
            if (confirm('Tem certeza que quer apagar esta compra?')) {
                const compra = compras.find(c => c.id === id);
                if (compra) {
                    const prod = produtos.find(p => p.id === compra.produtoId);
                    if (prod) {
                        prod.estoque -= compra.qtd;
                        if (prod.estoque < 0) prod.estoque = 0;
                    }
                    compras = compras.filter(c => c.id !== id);
                    salvarSnapshotEstoque(semanaAtual);
                    atualizarTudo();
                }
            }
        };

        window.excluirProduto = function(id) {
            if (confirm('Tem certeza que quer apagar este produto?')) {
                produtos = produtos.filter(p => p.id !== id);
                salvarDadosNaNuvem();
                atualizarTudo();
            }
        };

            if (venda) {

        window.abrirModalQuitacao = function(cliente) {

                alert('Este cliente não tem débitos pendentes!');
                return;
            }
            clienteQuitacaoPendente = cliente;
            const total = pendentes.reduce((acc, v) => acc + v.valorTotal, 0);
            document.getElementById('modalMensagem').innerHTML = `Quitar todos os débitos de <strong>${cliente}</strong>?<br>Total: R$ ${total.toFixed(2)}`;

        window.confirmarQuitacao = function() {
            if (clienteQuitacaoPendente) {
                vendas.forEach(v => {

                        v.status = 'pago';

                salvarDadosNaNuvem();
                atualizarClientes();
                atualizarVendas();
                atualizarVendasPorVendedor();

        function atualizarRelatorio() {
            const periodo = document.getElementById('periodoRelatorio')?.value || 'semana';
            const hoje = new Date();
            let vendasFilt = [], comprasFilt = [];
            if (periodo === 'semana') { 
                vendasFilt = vendas.filter(v => v.semana === semanaAtual); 
                comprasFilt = compras.filter(c => c.semana === semanaAtual); 
            } else if (periodo === 'mes') {
                vendasFilt = vendas.filter(v => new Date(v.data.split('/').reverse().join('-')).getMonth() === hoje.getMonth());
                comprasFilt = compras.filter(c => new Date(c.data.split('/').reverse().join('-')).getMonth() === hoje.getMonth());
            } else if (periodo === 'ano') {
                vendasFilt = vendas.filter(v => new Date(v.data.split('/').reverse().join('-')).getFullYear() === hoje.getFullYear());
                comprasFilt = compras.filter(c => new Date(c.data.split('/').reverse().join('-')).getFullYear() === hoje.getFullYear());
            } else { 
                vendasFilt = vendas; 
                comprasFilt = compras; 
            }
            const fat = vendasFilt.reduce((a, v) => a + v.valorTotal, 0);
            const rec = vendasFilt.filter(v => v.status === 'pago').reduce((a, v) => a + v.valorTotal, 0);
            const gas = comprasFilt.reduce((a, c) => a + c.valorTotal, 0);
            const elFat = document.getElementById('relFaturamento');
            const elGas = document.getElementById('relGastos');
            const elLucro = document.getElementById('relLucro');
            const elMargem = document.getElementById('relMargem');
            if (elFat) elFat.innerText = 'R$ ' + fat.toFixed(2);
            if (elGas) elGas.innerText = 'R$ ' + gas.toFixed(2);
            if (elLucro) elLucro.innerText = 'R$ ' + (rec - gas).toFixed(2);
            if (elMargem) elMargem.innerText = (rec > 0 ? ((rec - gas) / rec * 100).toFixed(1) : 0) + '%';
        }

                row.appendChild(tdVendas);
                
                const tdSaldo = document.createElement('td');
                tdSaldo.innerText = saldo;
                row.appendChild(tdSaldo);
                
                tbody.appendChild(row);
            }
            
            const elTotalCompras = document.getElementById('totalComprasSemana');
            const elTotalVendas = document.getElementById('totalVendasSemana');
            
            if (elTotalCompras) elTotalCompras.innerText = 'R$ ' + totalComprasValor.toFixed(2);
            if (elTotalVendas) elTotalVendas.innerText = 'R$ ' + totalVendasValor.toFixed(2);
        };

        window.cadastrarProduto = function() {
            const nome = document.getElementById('novoProdutoNome')?.value;
            const preco = parseFloat(document.getElementById('novoProdutoPreco')?.value);
            if (!nome || !preco) return alert('Preencha nome e preço!');
            produtos.push({ id: contadorId++, nome, preco, estoque: 0 });
            salvarDadosNaNuvem();
            document.getElementById('novoProdutoNome').value = '';
            document.getElementById('novoProdutoPreco').value = '';
            atualizarTudo();
        };

        // ---------- EDIÇÃO DE ESTOQUE ----------
        window.entrarModoEdicaoEstoque = function() {
            modoEdicaoAtivo = true;
            document.getElementById('btnModoEdicaoEstoque').style.display = 'none';
            document.getElementById('btnSalvarEstoque').style.display = 'inline-block';
            document.getElementById('btnCancelarEdicao').style.display = 'inline-block';
            const tbody = document.querySelector('#tabelaEstoque tbody');
            const linhas = tbody.querySelectorAll('tr');
            linhas.forEach((linha, index) => {
                const produto = produtos[index];
                if (produto) {
                    const qtdCell = linha.cells[1];
                    qtdCell.innerHTML = `<div class="estoque-editavel">
                        <input type="number" id="edit_${produto.id}" value="${produto.estoque}" min="0" style="width: 80px; padding: 5px; border: 2px solid #8b4513; border-radius: 5px; text-align: center;">
                    </div>`;
                }
            });
        };

        window.cancelarEdicaoEstoque = function() {
            modoEdicaoAtivo = false;
            document.getElementById('btnModoEdicaoEstoque').style.display = 'inline-block';
            document.getElementById('btnSalvarEstoque').style.display = 'none';
            document.getElementById('btnCancelarEdicao').style.display = 'none';
            atualizarEstoque();
        };

        window.salvarAjustesEstoque = function() {
            produtos.forEach(p => {
                const input = document.getElementById(`edit_${p.id}`);
                if (input) {
                    const novoEstoque = parseInt(input.value);
                    if (!isNaN(novoEstoque) && novoEstoque >= 0) {
                        p.estoque = novoEstoque;
                    }
                }
            });
            salvarSnapshotEstoque(semanaAtual);
            modoEdicaoAtivo = false;
            document.getElementById('btnModoEdicaoEstoque').style.display = 'inline-block';
            document.getElementById('btnSalvarEstoque').style.display = 'none';
            document.getElementById('btnCancelarEdicao').style.display = 'none';
            atualizarEstoque();
            salvarDadosNaNuvem();
            alert('✅ Estoque ajustado!');
        };

        function atualizarTabelaProdutos() {
            const tbodyPrecos = document.querySelector('#tabelaPrecos tbody');
            if (!tbodyPrecos) return;
            
            tbodyPrecos.innerHTML = '';
            
            for (let i = 0; i < produtos.length; i++) {
                const p = produtos[i];
                const row = document.createElement('tr');
                
                const tdNome = document.createElement('td');
                tdNome.innerText = p.nome;
                row.appendChild(tdNome);
                
                const tdPreco = document.createElement('td');
                tdPreco.innerText = 'R$ ' + p.preco.toFixed(2);
                row.appendChild(tdPreco);
                
                const tdEstoque = document.createElement('td');
                const spanEstoque = document.createElement('span');
                spanEstoque.className = p.estoque <= 2 ? 'status-pendente' : 'status-pago';
                spanEstoque.innerText = p.estoque;
                tdEstoque.appendChild(spanEstoque);
                row.appendChild(tdEstoque);
                
                const tdAcoes = document.createElement('td');
                const btnExcluir = document.createElement('button');
                btnExcluir.className = 'acao-btn excluir';
                btnExcluir.innerHTML = '🗑️';
                btnExcluir.onclick = function() { excluirProduto(p.id); };
                tdAcoes.appendChild(btnExcluir);
                row.appendChild(tdAcoes);
                
                tbodyPrecos.appendChild(row);
            }
        }

        function atualizarTudo() {
            atualizarSelects();
            calcularValorVenda();
            atualizarSelectSemanas();

            const vendasSemana = vendas.filter(v => v.semana === semanaAtual);
            const elVendasSemana = document.getElementById('vendasSemana');
            if (elVendasSemana) elVendasSemana.innerText = 'R$ ' + vendasSemana.reduce((a, v) => a + v.valorTotal, 0).toFixed(2);
            const elRecebidoSemana = document.getElementById('recebidoSemana');
            if (elRecebidoSemana) elRecebidoSemana.innerText = 'R$ ' + vendasSemana.filter(v => v.status === 'pago').reduce((a, v) => a + v.valorTotal, 0).toFixed(2);

            if (document.getElementById('tabelaEstoque') && !modoEdicaoAtivo) atualizarEstoque();

            atualizarTabelaProdutos();

            if (document.getElementById('tabelaCompras')) atualizarCompras();
            if (document.getElementById('tabelaHistorico')) atualizarHistorico();
            if (document.getElementById('corpoTodosGastos')) atualizarGastos();

            atualizarVendas();
            atualizarRelatorio();
            atualizarGastos();
            atualizarClientes();
            atualizarVendasPorVendedor();
        }

        function atualizarSelectSemanas() {
            const select = document.getElementById('selectSemana');
            if (!select) return;
            select.innerHTML = '';
            const semanas = [...new Set([...compras.map(c => c.semana), ...vendas.map(v => v.semana), ...historicoEstoque.map(h => h.semana), semanaAtual])].sort((a, b) => a - b);
            if (!semanas.length) semanas.push(semanaAtual);
            semanas.forEach(s => {
                select.innerHTML += `<option value="${s}" ${s === semanaAtual ? 'selected' : ''}>Semana ${s}</option>`;
            });
        }

        window.mudarSemana = function() {
            semanaAtual = parseInt(document.getElementById('selectSemana').value);
            atualizarTudo();
        };

        window.semanaAnterior = function() { 
            semanaAtual--; 
            atualizarSelectSemanas(); 
            document.getElementById('selectSemana').value = semanaAtual; 
            mudarSemana(); 
        };

        window.proximaSemana = function() { 
            semanaAtual++; 
            atualizarSelectSemanas(); 
            document.getElementById('selectSemana').value = semanaAtual; 
            mudarSemana(); 
        };

        window.imprimirCobranca = function() {
            let cobrancas = vendas.filter(v => v.status === 'pendente');
            if (filtroCobrancaAtual !== 'todos') cobrancas = cobrancas.filter(v => v.vendedor === filtroCobrancaAtual);
            const clientes = {};
            cobrancas.forEach(v => {
                if (!clientes[v.cliente]) {
                    clientes[v.cliente] = { total: 0, vendedor: v.vendedor, itens: [] };
                }
                clientes[v.cliente].total += v.valorTotal;
                clientes[v.cliente].itens.push(`${v.qtd}x ${v.produto}`);
            });
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Cobrança</title>
                    <style>
                        body { font-family: Courier New; padding: 20px; } 
                        table { border-collapse: collapse; width: 100%; } 
                        th { background: #8b4513; color: white; }
                    </style>
                </head>
                <body>
                    <h1>🧀 QUEIJARIA DO MINEIRO</h1>
                    <h2>Cobrança - ${new Date().toLocaleDateString()}</h2>
                    <table border="1">
                        <thead>
                            的人<th>Cliente</th><th>Vendedor</th><th>Débito</th><th>Produtos</th> </thead>
                        <tbody>
            `);
            Object.entries(clientes).forEach(([c, d]) => {
                win.document.write(`<tr><td><strong>${c}</strong></td><td>${d.vendedor}</td><td>R$ ${d.total.toFixed(2)}</td><td>${d.itens.join(', ')}</td></tr>`);
            });
            win.document.write(`
                        </tbody>
                    </table>
                    <p style="font-size:1.5rem;">Total: R$ ${Object.values(clientes).reduce((a, c) => a + c.total, 0).toFixed(2)}</p>
                </body>
                </html>
            `);
            win.document.close();
        };

        window.exportarParaExcel = async function() {
            mostrarSincronizando(true);
            try {
                const resp = await fetch(`${JSONBIN_URL}/latest`, { headers: JSONBIN_HEADERS });
                const dados = (await resp.json()).record;
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dados.produtos.map(p => ({ Código: p.id, Produto: p.nome, 'Preço': p.preco, Estoque: p.estoque }))), 'Produtos');
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dados.vendas.map(v => ({ Data: v.data, Vendedor: v.vendedor, Cliente: v.cliente, Produto: v.produto, Qtd: v.qtd, 'Total (R$)': v.valorTotal, Status: v.status === 'pago' ? 'Pago' : 'Pendente' }))), 'Vendas');
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dados.compras.map(c => ({ Data: c.data, Produto: c.produto, Qtd: c.qtd, 'Unitário': c.valorUnitario, 'Total': c.valorTotal, Fornecedor: c.fornecedor, Status: c.status === 'pago' ? 'Pago' : 'Pendente' }))), 'Compras');
                const vends = { Cláudio: 0, Antônio: 0, Igor: 0 };
                dados.vendas.forEach(v => vends[v.vendedor] += v.valorTotal);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(Object.entries(vends).map(([v, t]) => ({ Vendedor: v, 'Total Vendido (R$)': t }))), 'Vend por Vendedor');
                XLSX.writeFile(wb, `queijaria_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`);
                alert('✅ Excel gerado!');
            } catch (erro) { 
                console.error(erro);
                alert('❌ Erro ao gerar Excel'); 
            } finally { 
                mostrarSincronizando(false); 
            }
        };

        // ---------- INICIALIZAÇÃO ----------
        window.onload = async function() {
            await carregarUsuarios();
            if (verificarSessao()) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('popupMensagem').innerText = `👋 Bem‑vindo, ${primeiroNome}!`;
                document.getElementById('popupBoasVindas').style.display = 'block';
                carregarDadosDaNuvem();
                montarMenuInicial();
            }
        };
    </script>
</body>
</html>
