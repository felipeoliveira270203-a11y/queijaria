<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Queijaria do Mineiro</title>
    <style>
        /* ==================== */
        /* SEU CSS COMPLETO AQUI (COLE A PARTE DE ESTILO QUE VC JÁ TEM) */
        /* ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #d2b48c; background-image: linear-gradient(45deg, #8b4513 1px, transparent 1px); background-size: 20px 20px; padding: 10px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: #8b4513; background-image: repeating-linear-gradient(90deg, #a0522d 0px, #a0522d 2px, #8b4513 2px, #8b4513 4px); color: #f5e6d3; padding: 15px; border-radius: 15px 15px 5px 5px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 3px solid #654321; box-shadow: 5px 5px 0px #3f2b1c; text-shadow: 2px 2px 0px #3f2b1c; }
        .header h1 { font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; }
        .badge-nuvem { background-color: #2e8b57; color: #f5e6d3; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; border: 2px solid #654321; }
        .semana-selector { display: flex; align-items: center; gap: 8px; background: #f5e6d3; padding: 5px 10px; border-radius: 30px; border: 2px solid #654321; margin-bottom: 15px; width: fit-content; }
        .semana-selector select { background: #f5e6d3; border: none; color: #3f2b1c; font-weight: bold; font-size: 1rem; padding: 3px; font-family: 'Courier New', Courier, monospace; }
        .semana-selector button { background: none; border: none; color: #3f2b1c; font-size: 1.3rem; cursor: pointer; padding: 0 3px; font-weight: bold; }
        .btn-flutuante { position: fixed; bottom: 20px; right: 20px; background-color: #f5e6d3; color: #3f2b1c; width: 70px; height: 70px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 35px; border: 4px solid #654321; box-shadow: 5px 5px 0px #3f2b1c; cursor: pointer; z-index: 1000; }
        .btn-flutuante span { font-size: 10px; font-weight: bold; margin-top: -5px; }
        .menu-rapido { position: fixed; bottom: 100px; right: 20px; background: #f5e6d3; border: 4px solid #654321; border-radius: 15px; padding: 10px; box-shadow: 5px 5px 0px #3f2b1c; z-index: 999; display: none; flex-direction: column; gap: 5px; min-width: 150px; }
        .menu-rapido.ativo { display: flex; }
        .menu-item { padding: 10px 15px; background: #cd853f; border: 2px solid #654321; border-radius: 8px; color: #3f2b1c; font-weight: bold; text-align: center; cursor: pointer; transition: all 0.2s; }
        .menu-item:hover { background: #8b4513; color: #f5e6d3; }
        .card { background: #f5e6d3; border: 4px solid #654321; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 6px 6px 0px #3f2b1c; }
        .card-title { font-size: 1.3rem; font-weight: bold; color: #3f2b1c; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px dashed #8b4513; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; color: #3f2b1c; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 3px solid #8b4513; border-radius: 8px; font-size: 1rem; background-color: #fff8dc; font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        .campo-total { background-color: #daa520; border: 4px solid #654321; border-radius: 8px; padding: 15px; margin: 15px 0; text-align: center; }
        .campo-total .label { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; color: #3f2b1c; }
        .campo-total .valor { font-size: 2rem; font-weight: bold; color: #3f2b1c; text-shadow: 2px 2px 0px #f5e6d3; }
        .btn { width: 100%; padding: 15px; background-color: #cd853f; color: #3f2b1c; border: 3px solid #654321; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 4px 4px 0px #3f2b1c; font-family: 'Courier New', Courier, monospace; }
        .btn-success { background-color: #2e8b57; color: #f5e6d3; }
        .btn-print { background-color: #8b4513; color: #f5e6d3; }
        .btn-small { padding: 6px 12px; font-size: 0.9rem; width: auto; display: inline-block; }
        .tabela-container { overflow-x: auto; margin-top: 10px; border: 2px solid #8b4513; background: #fff8dc; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 8px; background-color: #8b4513; color: #f5e6d3; font-weight: bold; font-size: 0.9rem; border-bottom: 3px solid #654321; }
        td { padding: 10px 8px; border-bottom: 1px solid #cd853f; color: #3f2b1c; font-weight: bold; }
        .valor-vermelho { color: #b22222; font-weight: bold; }
        .vendedor-badge { background-color: #daa520; color: #3f2b1c; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; border: 1px solid #3f2b1c; margin-left: 5px; }
        .acao-btn { background: #f5e6d3; border: 2px solid #654321; font-size: 1.2rem; cursor: pointer; padding: 5px 8px; border-radius: 5px; margin: 2px; box-shadow: 2px 2px 0px #3f2b1c; }
        .status-pago { background-color: #2e8b57; color: #f5e6d3; padding: 4px 8px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: inline-block; border: 2px solid #3f2b1c; }
        .status-pendente { background-color: #b22222; color: #f5e6d3; padding: 4px 8px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: inline-block; border: 2px solid #3f2b1c; }
        .hidden { display: none; }
        .resumo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .resumo-card { background: #cd853f; color: #3f2b1c; padding: 15px; border-radius: 8px; border: 3px solid #654321; box-shadow: 4px 4px 0px #3f2b1c; }
        .resumo-card .label { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .resumo-card .valor { font-size: 1.5rem; font-weight: bold; margin-top: 5px; text-shadow: 2px 2px 0px #3f2b1c; color: #f5e6d3; }
        .filtros { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .filtro-btn { padding: 6px 12px; border-radius: 20px; background: #f5e6d3; border: 2px solid #654321; cursor: pointer; font-weight: bold; box-shadow: 2px 2px 0px #3f2b1c; }
        .filtro-btn.ativo { background: #cd853f; color: #3f2b1c; border: 2px solid #f5e6d3; }
        .estoque-editavel { display: flex; align-items: center; gap: 10px; }
        .estoque-editavel input { width: 80px; padding: 8px; border: 3px solid #8b4513; border-radius: 5px; text-align: center; font-weight: bold; background: #fff8dc; }
        .sincronizando { position: fixed; bottom: 100px; left: 20px; background: #2e8b57; color: #f5e6d3; padding: 8px 15px; border-radius: 20px; border: 2px solid #654321; font-size: 0.9rem; display: none; z-index: 1001; }
        @media print { /* seus estilos de print */ }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧀 QUEIJARIA DO MINEIRO</h1>
            <div class="badge-nuvem" id="statusConexao">☁️ CONECTANDO...</div>
        </div>

        <div class="semana-selector">
            <button onclick="semanaAnterior()">←</button>
            <select id="selectSemana" onchange="mudarSemana()"></select>
            <button onclick="proximaSemana()">→</button>
        </div>

        <!-- ABA VENDAS -->
        <div id="abaVendas"> ... (COLE AQUI TODO O CONTEÚDO DAS ABAS QUE VOCÊ JÁ TEM) ... </div>
        <!-- ABA ESTOQUE -->
        <div id="abaEstoque" class="hidden"> ... </div>
        <!-- ABA COMPRAS -->
        <div id="abaCompras" class="hidden"> ... </div>
        <!-- ABA GASTOS -->
        <div id="abaGastos" class="hidden"> ... </div>
        <!-- ABA RELATÓRIOS -->
        <div id="abaRelatorios" class="hidden"> ... </div>
        <!-- ABA PRODUTOS -->
        <div id="abaProdutos" class="hidden"> ... </div>
        <!-- ABA CLIENTES -->
        <div id="abaClientes" class="hidden"> ... </div>
    </div>

    <!-- Menu rápido da vaquinha -->
    <div class="menu-rapido" id="menuRapido">
        <div class="menu-item" onclick="irParaAba('vendas')">💰 Vendas</div>
        <div class="menu-item" onclick="irParaAba('estoque')">📦 Estoque</div>
        <div class="menu-item" onclick="irParaAba('compras')">📥 Compras</div>
        <div class="menu-item" onclick="irParaAba('gastos')">💸 Gastos</div>
        <div class="menu-item" onclick="irParaAba('relatorios')">📊 Resultado</div>
        <div class="menu-item" onclick="irParaAba('produtos')">⚙️ Produtos</div>
        <div class="menu-item" onclick="irParaAba('clientes')">👥 Cobranças</div>
    </div>

    <!-- Botão flutuante - Vaquinha -->
    <button class="btn-flutuante" onclick="toggleMenuRapido()">
        🐮
        <span>MENU</span>
    </button>

    <div class="sincronizando" id="sincronizando">☁️ Sincronizando...</div>

    <script>
        // ========== CONFIGURAÇÃO DO JSONBIN.IO ==========
        // 👇👇👇 COLE AQUI SUAS CHAVES DO JSONBIN.IO 👇👇👇
        const JSONBIN_CONFIG = {
            BIN_ID: '69b50d08c3097a1dd523c95e',        // Ex: '65b7a8dfdc74654018a5a6b5'
            MASTER_KEY: '$2a$10$KnI8AylSe1WUMY3mZUEkHeJ7hXaL4UoBv3ZIPl7TH/OnsIc3NHvqi' // Ex: '$2b$10$z5Hc...'
        };
        // 👆👆👆 COLE AQUI SUAS CHAVES DO JSONBIN.IO 👆👆👆

        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}`;
        const JSONBIN_HEADERS = {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_CONFIG.MASTER_KEY,
            'X-Bin-Versioning': 'false' // Evita criar versões, economiza requisições
        };

        // ========== VARIÁVEIS GLOBAIS ==========
        let semanaAtual = getSemanaAtual();
        let historicoEstoque = [];
        let filtroCobrancaAtual = 'todos';
        let filtroVendasAtual = 'todas';
        let modoEdicaoAtivo = false;

        // Dados
        let produtos = [];
        let compras = [];
        let vendas = [];
        let contadorId = 21;

        // ========== FUNÇÕES DE SINCRONIZAÇÃO COM O JSONBIN ==========
        function mostrarSincronizando(mostrar = true) {
            const el = document.getElementById('sincronizando');
            if (mostrar) {
                el.style.display = 'block';
            } else {
                setTimeout(() => { el.style.display = 'none'; }, 1000);
            }
        }

        function atualizarStatusConexao(conectado) {
            const el = document.getElementById('statusConexao');
            if (conectado) {
                el.innerHTML = '☁️ NUVEM';
                el.style.backgroundColor = '#2e8b57';
            } else {
                el.innerHTML = '⚠️ LOCAL';
                el.style.backgroundColor = '#b22222';
            }
        }

        // Carregar dados do JSONBin
        async function carregarDadosDaNuvem() {
            mostrarSincronizando(true);
            atualizarStatusConexao(false);
            try {
                console.log('🔄 Tentando carregar dados do JSONBin...');
                const resposta = await fetch(JSONBIN_URL, {
                    method: 'GET',
                    headers: JSONBIN_HEADERS
                });

                if (!resposta.ok) {
                    throw new Error(`Erro HTTP: ${resposta.status}`);
                }

                const dadosJson = await resposta.json(); // O JSONBin retorna { record: {...} }
                const dados = dadosJson.record;

                console.log('✅ Dados carregados do JSONBin:', dados);

                produtos = dados.produtos || [];
                compras = dados.compras || [];
                vendas = dados.vendas || [];
                historicoEstoque = dados.historicoEstoque || [];
                contadorId = dados.contadorId || 21;

                atualizarStatusConexao(true);
                atualizarTudo();

            } catch (erro) {
                console.error('❌ Erro ao carregar da nuvem:', erro);
                alert('Erro ao carregar dados da nuvem. Usando dados locais.');
                usarDadosIniciais();
            } finally {
                mostrarSincronizando(false);
            }
        }

        // Salvar dados no JSONBin
        async function salvarDadosNaNuvem() {
            mostrarSincronizando(true);
            const dados = {
                produtos: produtos,
                compras: compras,
                vendas: vendas,
                historicoEstoque: historicoEstoque,
                contadorId: contadorId
            };

            try {
                console.log('🔄 Salvando dados no JSONBin...');
                const resposta = await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: JSONBIN_HEADERS,
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    console.log('✅ Dados salvos na nuvem');
                    atualizarStatusConexao(true);
                } else {
                    console.error('❌ Erro ao salvar na nuvem:', await resposta.text());
                    atualizarStatusConexao(false);
                }
            } catch (erro) {
                console.error('❌ Erro de conexão:', erro);
                atualizarStatusConexao(false);
            } finally {
                mostrarSincronizando(false);
            }
        }

        function usarDadosIniciais() {
            console.log('📝 Usando dados iniciais locais');
            produtos = [
                {id: 1, nome: 'Cachaça litro', preco: 28.00, estoque: 0},
                // ... (seus outros produtos)
            ];
            compras = [];
            vendas = [];
            historicoEstoque = [];
            contadorId = 21;
            atualizarTudo();
        }

        // ========== FUNÇÕES UTILITÁRIAS ==========
        function getSemanaAtual() {
            let hoje = new Date();
            let primeiroDiaAno = new Date(hoje.getFullYear(), 0, 1);
            let dias = Math.floor((hoje - primeiroDiaAno) / (24 * 60 * 60 * 1000));
            return Math.ceil((dias + primeiroDiaAno.getDay() + 1) / 7);
        }

        function salvarSnapshotEstoque(semana) {
            let snapshot = {
                semana: semana,
                data: new Date().toLocaleDateString(),
                itens: produtos.map(p => ({ id: p.id, nome: p.nome, quantidade: p.estoque }))
            };
            historicoEstoque = historicoEstoque.filter(h => h.semana !== semana);
            historicoEstoque.push(snapshot);
            salvarDadosNaNuvem(); // Salva no JSONBin
        }

        // ========== FUNÇÕES DA VAQUINHA ==========
        function toggleMenuRapido() {
            document.getElementById('menuRapido').classList.toggle('ativo');
        }

        function irParaAba(aba) {
            document.getElementById('menuRapido').classList.remove('ativo');
            const abas = ['vendas', 'estoque', 'compras', 'gastos', 'relatorios', 'produtos', 'clientes'];
            abas.forEach(a => document.getElementById(`aba${a.charAt(0).toUpperCase() + a.slice(1)}`).classList.add('hidden'));

            document.getElementById(`aba${aba.charAt(0).toUpperCase() + aba.slice(1)}`).classList.remove('hidden');

            if (aba === 'compras') calcularTotalCompra();
            if (aba === 'gastos') atualizarGastos();
            if (aba === 'relatorios') atualizarRelatorio();
            if (aba === 'estoque') atualizarEstoque();
            if (aba === 'clientes') atualizarClientes();
            atualizarTudo();
        }

        // ========== FUNÇÕES PRINCIPAIS (REGISTRAR, ATUALIZAR, ETC) ==========
        // (COLE AQUI TODAS AS FUNÇÕES QUE VOCÊ JÁ TEM: registrarCompra, registrarVenda, 
        //  excluirVenda, alterarStatusVenda, filtrarVendas, atualizarVendas, 
        //  atualizarClientes, atualizarGastos, atualizarRelatorio, etc.)
        // 
        // IMPORTANTE: Dentro de cada função que MODIFICA os dados (vendas, compras, estoque),
        // você já tem a chamada `salvarSnapshotEstoque(...)`. Essa função agora chama
        // `salvarDadosNaNuvem()`, que salva no JSONBin.

        // ========== INICIALIZAR ==========
        window.onload = async function() {
            document.getElementById('vendaSemanaAtual').innerText = semanaAtual;
            document.getElementById('vendaSemanaLista').innerText = semanaAtual;
            document.getElementById('semanaEstoqueAtual').innerText = semanaAtual;
            document.getElementById('compraSemanaAtual').innerText = semanaAtual;

            await carregarDadosDaNuvem();
            irParaAba('vendas');
        };
    </script>
</body>
</html>
